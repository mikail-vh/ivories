<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1d24">
<title>Piano Cheat Sheet</title>
<style>
  :root {
    --bg: #0f1115;
    --bg-elev: #1a1d24;
    --bg-elev-2: #232730;
    --border: #2c3140;
    --text: #e6e8ee;
    --text-dim: #9aa0ad;
    --accent: #ffd43b;
    --root: #ff6b6b;
    --root-dark: #c92a2a;
    --note: #4dabf7;
    --note-dark: #1971c2;
    --white-key: #f5f5f5;
    --black-key: #1a1a1a;
    --danger: #ff5252;
    --success: #51cf66;
    --gap: 14px;
  }

  body.light {
    --bg: #f4f6fa;
    --bg-elev: #ffffff;
    --bg-elev-2: #eef0f5;
    --border: #d8dde6;
    --text: #1a1d24;
    --text-dim: #5b6273;
    --white-key: #ffffff;
    --black-key: #222;
  }

  body.hide-root .root-legend { display: none; }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    padding-top: max(10px, env(safe-area-inset-top));
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.3px;
  }
  h1 .accent { color: var(--accent); }

  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  button {
    background: var(--bg-elev-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  button:hover { border-color: var(--accent); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button:disabled:hover { border-color: var(--border); }

  button.primary {
    background: var(--accent);
    color: #1a1d24;
    border-color: var(--accent);
    font-weight: 600;
  }

  button.danger {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }

  button.icon {
    padding: 7px 10px;
  }

  .tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tabs-inner {
    display: inline-flex;
    gap: 2px;
    padding: 6px 10px;
  }

  .tab {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid transparent;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 48px;
  }

  .tab.active {
    background: var(--accent);
    color: #1a1d24;
  }

  .tab:not(.active):hover {
    background: var(--bg-elev-2);
    color: var(--text);
  }

  main {
    padding: 14px 12px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin: 22px 0 10px;
    font-weight: 600;
  }
  .section-title:first-child { margin-top: 6px; }

  .grid {
    display: grid;
    gap: var(--gap);
  }

  body.mode-expanded .grid {
    grid-template-columns: 1fr;
  }
  @media (min-width: 720px) {
    body.mode-expanded .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (min-width: 1100px) {
    body.mode-expanded .grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  body.mode-compact { --gap: 8px; }
  body.mode-compact .grid {
    grid-template-columns: repeat(2, 1fr);
  }
  @media (min-width: 600px) {
    body.mode-compact .grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }
  @media (min-width: 900px) {
    body.mode-compact .grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  body.mode-compact .card { padding: 8px; gap: 6px; border-radius: 10px; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }

  .card-titles {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.1;
  }
  body.mode-compact .card-title { font-size: 0.92rem; }

  .card-sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .card-meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    line-height: 1.3;
  }
  body.mode-compact .card-meta { display: none; }

  .star-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-size: 1.25rem;
    line-height: 1;
    padding: 2px 7px;
    border-radius: 6px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .star-btn:hover {
    background: var(--bg-elev-2);
    border-color: var(--border);
    color: var(--accent);
  }
  .star-btn.on {
    color: var(--accent);
  }

  .reorder-row {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 2px;
  }
  .reorder-row button {
    padding: 4px 10px;
    font-size: 0.85rem;
    flex: 0 0 auto;
  }
  .pos-pill {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .piano-svg {
    width: 100%;
    height: auto;
    display: block;
    background: var(--bg-elev-2);
    border-radius: 6px;
    padding: 4px;
    user-select: none;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
  .swatch.root { background: var(--root); }
  .swatch.note { background: var(--note); }

  .legend select {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.82rem;
    font-family: inherit;
    max-width: 200px;
  }
  .legend select:focus { outline: none; border-color: var(--accent); }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .empty-state strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 1rem; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .key-label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    h1 { font-size: 0.95rem; }
    button { padding: 6px 10px; font-size: 0.78rem; }
    .tab { padding: 7px 11px; font-size: 0.82rem; }
    main { padding: 10px 8px 80px; }
  }
</style>
</head>
<body class="mode-expanded">

<header>
  <div class="header-row">
    <h1>🎹 Piano <span class="accent">Cheat Sheet</span></h1>
    <div class="controls">
      <button id="modeToggle" title="Toggle layout density">Compact</button>
      <button id="rootToggle" title="Show or hide the root-note highlight">Hide root</button>
      <button id="themeToggle" class="icon" title="Toggle theme">☀</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner" id="tabs"></div>
</nav>

<main>
  <div class="legend">
    <div class="legend-item root-legend"><div class="swatch root"></div> Root note</div>
    <div class="legend-item"><div class="swatch note"></div> Chord / scale tone</div>
    <div class="legend-item" style="margin-left:auto; gap:6px;">
      <span>★ list:</span>
      <select id="activePageSelect" title="Which list stars are added to"></select>
    </div>
  </div>

  <div id="content"></div>
</main>

<script>
/* ===== Constants ===== */
const NOTE_NAMES_SHARP = ['C', 'C♯', 'D', 'D♯', 'E', 'F', 'F♯', 'G', 'G♯', 'A', 'A♯', 'B'];
const NOTE_NAMES_DISPLAY = ['C', 'C♯/D♭', 'D', 'D♯/E♭', 'E', 'F', 'F♯/G♭', 'G', 'G♯/A♭', 'A', 'A♯/B♭', 'B'];

const ROOTS = NOTE_NAMES_DISPLAY.map((n, i) => ({ pc: i, name: n, short: NOTE_NAMES_SHARP[i] }));

const CHORDS = [
  { cat: 'Triads',     suffix: '5',     label: 'Power',          intervals: [0, 7] },
  { cat: 'Triads',     suffix: '',      label: 'Major',          intervals: [0, 4, 7] },
  { cat: 'Triads',     suffix: 'm',     label: 'Minor',          intervals: [0, 3, 7] },
  { cat: 'Triads',     suffix: 'dim',   label: 'Diminished',     intervals: [0, 3, 6] },
  { cat: 'Triads',     suffix: 'aug',   label: 'Augmented',      intervals: [0, 4, 8] },
  { cat: 'Triads',     suffix: 'sus2',  label: 'Sus 2',          intervals: [0, 2, 7] },
  { cat: 'Triads',     suffix: 'sus4',  label: 'Sus 4',          intervals: [0, 5, 7] },

  { cat: 'Added tone', suffix: '2',       label: 'Add 2 (1-2-3-5)', intervals: [0, 2, 4, 7] },
  { cat: 'Added tone', suffix: '4',       label: 'Add 4 (1-3-4-5)', intervals: [0, 4, 5, 7] },
  { cat: 'Added tone', suffix: 'add9',    label: 'Add 9',           intervals: [0, 4, 7, 14] },
  { cat: 'Added tone', suffix: 'add11',   label: 'Add 11',          intervals: [0, 4, 7, 17] },
  { cat: 'Added tone', suffix: 'madd9',   label: 'Minor add 9',     intervals: [0, 3, 7, 14] },
  { cat: 'Added tone', suffix: 'madd11',  label: 'Minor add 11',    intervals: [0, 3, 7, 17] },

  { cat: 'Sixths',     suffix: '6',     label: 'Major 6',        intervals: [0, 4, 7, 9] },
  { cat: 'Sixths',     suffix: 'm6',    label: 'Minor 6',        intervals: [0, 3, 7, 9] },
  { cat: 'Sixths',     suffix: '6/9',   label: 'Major 6/9',      intervals: [0, 4, 7, 9, 14] },
  { cat: 'Sixths',     suffix: 'm6/9',  label: 'Minor 6/9',      intervals: [0, 3, 7, 9, 14] },

  { cat: 'Sevenths',   suffix: '7',      label: 'Dominant 7',      intervals: [0, 4, 7, 10] },
  { cat: 'Sevenths',   suffix: 'maj7',   label: 'Major 7',         intervals: [0, 4, 7, 11] },
  { cat: 'Sevenths',   suffix: 'm7',     label: 'Minor 7',         intervals: [0, 3, 7, 10] },
  { cat: 'Sevenths',   suffix: 'mMaj7',  label: 'Minor major 7',   intervals: [0, 3, 7, 11] },
  { cat: 'Sevenths',   suffix: 'dim7',   label: 'Diminished 7',    intervals: [0, 3, 6, 9] },
  { cat: 'Sevenths',   suffix: 'm7♭5',   label: 'Half-diminished', intervals: [0, 3, 6, 10] },
  { cat: 'Sevenths',   suffix: 'aug7',   label: 'Augmented 7',     intervals: [0, 4, 8, 10] },
  { cat: 'Sevenths',   suffix: '7sus2',  label: '7 sus 2',         intervals: [0, 2, 7, 10] },
  { cat: 'Sevenths',   suffix: '7sus4',  label: '7 sus 4',         intervals: [0, 5, 7, 10] },
  { cat: 'Sevenths',   suffix: '7♭5',    label: '7 ♭5',            intervals: [0, 4, 6, 10] },
  { cat: 'Sevenths',   suffix: '7♯5',    label: '7 ♯5',            intervals: [0, 4, 8, 10] },
  { cat: 'Sevenths',   suffix: 'maj7♯5', label: 'Major 7 ♯5',      intervals: [0, 4, 8, 11] },
  { cat: 'Sevenths',   suffix: 'maj7♭5', label: 'Major 7 ♭5',      intervals: [0, 4, 6, 11] },

  { cat: 'Ninths',     suffix: '9',      label: 'Dominant 9',     intervals: [0, 4, 7, 10, 14] },
  { cat: 'Ninths',     suffix: 'maj9',   label: 'Major 9',        intervals: [0, 4, 7, 11, 14] },
  { cat: 'Ninths',     suffix: 'm9',     label: 'Minor 9',        intervals: [0, 3, 7, 10, 14] },
  { cat: 'Ninths',     suffix: 'mMaj9',  label: 'Minor major 9',  intervals: [0, 3, 7, 11, 14] },
  { cat: 'Ninths',     suffix: '9sus4',  label: '9 sus 4',        intervals: [0, 5, 7, 10, 14] },
  { cat: 'Ninths',     suffix: '7♭9',    label: '7 ♭9',           intervals: [0, 4, 7, 10, 13] },
  { cat: 'Ninths',     suffix: '7♯9',    label: '7 ♯9',           intervals: [0, 4, 7, 10, 15] },
  { cat: 'Ninths',     suffix: 'm7♭9',   label: 'Minor 7 ♭9',     intervals: [0, 3, 7, 10, 13] },

  { cat: 'Elevenths',  suffix: '11',       label: 'Dominant 11',  intervals: [0, 4, 7, 10, 14, 17] },
  { cat: 'Elevenths',  suffix: 'maj11',    label: 'Major 11',     intervals: [0, 4, 7, 11, 14, 17] },
  { cat: 'Elevenths',  suffix: 'm11',      label: 'Minor 11',     intervals: [0, 3, 7, 10, 14, 17] },
  { cat: 'Elevenths',  suffix: '7♯11',     label: '7 ♯11',        intervals: [0, 4, 7, 10, 14, 18] },
  { cat: 'Elevenths',  suffix: 'maj7♯11',  label: 'Major 7 ♯11',  intervals: [0, 4, 7, 11, 14, 18] },

  { cat: 'Thirteenths', suffix: '13',     label: 'Dominant 13',   intervals: [0, 4, 7, 10, 14, 21] },
  { cat: 'Thirteenths', suffix: 'maj13',  label: 'Major 13',      intervals: [0, 4, 7, 11, 14, 21] },
  { cat: 'Thirteenths', suffix: 'm13',    label: 'Minor 13',      intervals: [0, 3, 7, 10, 14, 21] },
  { cat: 'Thirteenths', suffix: '13sus4', label: '13 sus 4',      intervals: [0, 5, 7, 10, 14, 21] },
];

const CHORD_CATEGORIES = ['Triads', 'Added tone', 'Sixths', 'Sevenths', 'Ninths', 'Elevenths', 'Thirteenths'];

const SCALES = [
  { suffix: 'major',     label: 'Major scale',      intervals: [0, 2, 4, 5, 7, 9, 11] },
  { suffix: 'minor',     label: 'Natural minor',    intervals: [0, 2, 3, 5, 7, 8, 10] },
  { suffix: 'harmonic',  label: 'Harmonic minor',   intervals: [0, 2, 3, 5, 7, 8, 11] },
  { suffix: 'pent-maj',  label: 'Major pentatonic', intervals: [0, 2, 4, 7, 9] },
  { suffix: 'pent-min',  label: 'Minor pentatonic', intervals: [0, 3, 5, 7, 10] },
  { suffix: 'blues',     label: 'Blues',            intervals: [0, 3, 5, 6, 7, 10] },
  { suffix: 'dorian',    label: 'Dorian mode',      intervals: [0, 2, 3, 5, 7, 9, 10] },
  { suffix: 'mixolyd',   label: 'Mixolydian mode',  intervals: [0, 2, 4, 5, 7, 9, 10] },
];

/* ===== Piano renderer (SVG) ===== */
const WHITE_OFFSETS = [0, 2, 4, 5, 7, 9, 11];
const BLACK_KEYS = [
  { afterWhite: 0, pc: 1 },
  { afterWhite: 1, pc: 3 },
  { afterWhite: 3, pc: 6 },
  { afterWhite: 4, pc: 8 },
  { afterWhite: 5, pc: 10 },
];

function renderPiano({ pitchClasses = [], rootPc = -1, octaves = 2, startOctave = 4, exactMidi = null } = {}) {
  /* When the root is hidden, treat the root pitch class as a non-highlighted key. */
  const hideRoot = document.body.classList.contains('hide-root');
  const effRoot = hideRoot ? -1 : rootPc;
  const effPcs = (hideRoot && rootPc >= 0) ? pitchClasses.filter(p => p !== rootPc) : pitchClasses;
  const effExact = (hideRoot && rootPc >= 0 && exactMidi)
    ? exactMidi.filter(m => (m % 12) !== rootPc)
    : exactMidi;

  const WHITE_W = 40, WHITE_H = 160;
  const BLACK_W = 24, BLACK_H = 100;
  const numWhite = octaves * 7 + 1;
  const totalW = numWhite * WHITE_W;
  const startMidi = (startOctave + 1) * 12;

  const pcSet = new Set(effPcs);
  const exactSet = effExact ? new Set(effExact) : null;

  function isHighlighted(midi, pc) {
    if (exactSet) return exactSet.has(midi);
    return pcSet.has(pc);
  }
  function isRootKey(midi, pc) {
    if (effRoot < 0) return false;
    if (exactSet) return exactSet.has(midi) && pc === effRoot;
    return pc === effRoot;
  }

  let whiteSvg = '', blackSvg = '', labelsSvg = '';

  let whiteIdx = 0;
  for (let oct = 0; oct < octaves; oct++) {
    for (let i = 0; i < 7; i++) {
      const pc = WHITE_OFFSETS[i];
      const midi = startMidi + oct * 12 + pc;
      const x = whiteIdx * WHITE_W;
      const isRoot = isRootKey(midi, pc);
      const hl = isHighlighted(midi, pc);
      const fill = isRoot ? 'var(--root)' : hl ? 'var(--note)' : 'var(--white-key)';
      whiteSvg += `<rect x="${x}" y="0" width="${WHITE_W}" height="${WHITE_H}" rx="3" fill="${fill}" stroke="#222" stroke-width="1.2"/>`;
      if (hl || isRoot) {
        labelsSvg += `<text class="key-label" x="${x + WHITE_W/2}" y="${WHITE_H - 14}" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">${NOTE_NAMES_SHARP[pc]}</text>`;
      }
      whiteIdx++;
    }
  }
  /* Trailing C */
  {
    const lastX = octaves * 7 * WHITE_W;
    const midi = startMidi + octaves * 12;
    const isRoot = isRootKey(midi, 0);
    const hl = isHighlighted(midi, 0);
    const fill = isRoot ? 'var(--root)' : hl ? 'var(--note)' : 'var(--white-key)';
    whiteSvg += `<rect x="${lastX}" y="0" width="${WHITE_W}" height="${WHITE_H}" rx="3" fill="${fill}" stroke="#222" stroke-width="1.2"/>`;
    if (hl || isRoot) {
      labelsSvg += `<text class="key-label" x="${lastX + WHITE_W/2}" y="${WHITE_H - 14}" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">C</text>`;
    }
  }

  for (let oct = 0; oct < octaves; oct++) {
    for (const bk of BLACK_KEYS) {
      const whiteIdxBk = oct * 7 + bk.afterWhite;
      const x = (whiteIdxBk + 1) * WHITE_W - BLACK_W / 2;
      const pc = bk.pc;
      const midi = startMidi + oct * 12 + pc;
      const isRoot = isRootKey(midi, pc);
      const hl = isHighlighted(midi, pc);
      const fill = isRoot ? 'var(--root-dark)' : hl ? 'var(--note-dark)' : 'var(--black-key)';
      blackSvg += `<rect x="${x}" y="0" width="${BLACK_W}" height="${BLACK_H}" rx="2" fill="${fill}" stroke="#000" stroke-width="1"/>`;
      if (hl || isRoot) {
        labelsSvg += `<text class="key-label" x="${x + BLACK_W/2}" y="${BLACK_H - 8}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${NOTE_NAMES_SHARP[pc]}</text>`;
      }
    }
  }

  return `<svg viewBox="0 0 ${totalW} ${WHITE_H}" class="piano-svg" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">${whiteSvg}${blackSvg}${labelsSvg}</svg>`;
}

/* ===== Helpers ===== */
const pcOf = (rootPc, interval) => (rootPc + interval) % 12;
const pitchClassesFor = (rootPc, intervals) => intervals.map(i => pcOf(rootPc, i));
const noteListString = (rootPc, intervals) =>
  intervals.map(i => NOTE_NAMES_SHARP[pcOf(rootPc, i)]).join(' · ');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function chordTitle(rootPc, chord) {
  return `${NOTE_NAMES_SHARP[rootPc]}${chord.suffix}`;
}
function scaleTitle(rootPc, scale) {
  return `${NOTE_NAMES_SHARP[rootPc]} ${scale.label}`;
}

/* ===== State ===== */
const PAGES_KEY  = 'piano-favorites:v2';
const PREFS_KEY  = 'piano-cheat-sheet:prefs:v1';

const state = {
  activeTab: 'C',
  pages: [{ id: 'default', name: 'My chords', items: [] }],
  activePageId: 'default',
};

function loadState() {
  try {
    const raw = localStorage.getItem(PAGES_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && Array.isArray(data.pages) && data.pages.length) {
        state.pages = data.pages;
        state.activePageId = data.activePageId && data.pages.some(p => p.id === data.activePageId)
          ? data.activePageId
          : data.pages[0].id;
      }
    }
  } catch {}
  try {
    const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
    if (prefs.mode === 'compact') {
      document.body.classList.remove('mode-expanded');
      document.body.classList.add('mode-compact');
      document.getElementById('modeToggle').textContent = 'Expanded';
    }
    if (prefs.theme === 'light') {
      document.body.classList.add('light');
      document.getElementById('themeToggle').textContent = '☾';
    }
    if (prefs.hideRoot) {
      document.body.classList.add('hide-root');
      document.getElementById('rootToggle').textContent = 'Show root';
    }
    if (prefs.activeTab) state.activeTab = prefs.activeTab;
  } catch {}
}

function savePages() {
  localStorage.setItem(PAGES_KEY, JSON.stringify({
    pages: state.pages,
    activePageId: state.activePageId,
  }));
}

function savePrefs() {
  const prefs = {
    mode: document.body.classList.contains('mode-compact') ? 'compact' : 'expanded',
    theme: document.body.classList.contains('light') ? 'light' : 'dark',
    hideRoot: document.body.classList.contains('hide-root'),
    activeTab: state.activeTab,
  };
  localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
}

function activePage() {
  return state.pages.find(p => p.id === state.activePageId) || state.pages[0];
}

/* ===== Favorites ===== */
function favKey(item) { return `${item.kind}:${item.idx}:${item.rootPc}`; }
function isFavorited(kind, idx, rootPc) {
  const k = favKey({ kind, idx, rootPc });
  return activePage().items.some(it => favKey(it) === k);
}
function toggleFavorite(kind, idx, rootPc) {
  const page = activePage();
  const k = favKey({ kind, idx, rootPc });
  const existing = page.items.findIndex(it => favKey(it) === k);
  if (existing >= 0) page.items.splice(existing, 1);
  else page.items.push({ kind, idx, rootPc });
  savePages();
  renderActiveTab();
}

/* ===== Cards ===== */
function starButton(kind, idx, rootPc) {
  const fav = isFavorited(kind, idx, rootPc);
  return `<button class="star-btn ${fav ? 'on' : ''}" data-star-kind="${kind}" data-star-idx="${idx}" data-star-root="${rootPc}" title="${fav ? 'Remove from list' : 'Add to list'}" aria-label="${fav ? 'Starred' : 'Not starred'}">${fav ? '★' : '☆'}</button>`;
}

function chordCard(rootPc, chord, chordIdx, opts = {}) {
  const pcs = pitchClassesFor(rootPc, chord.intervals);
  const piano = renderPiano({ pitchClasses: pcs, rootPc, octaves: 2 });
  const title = chordTitle(rootPc, chord);
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-titles">
          <h3 class="card-title">${escapeHtml(title)}</h3>
          <span class="card-sub">${escapeHtml(chord.label)}</span>
        </div>
        ${starButton('chord', chordIdx, rootPc)}
      </div>
      ${piano}
      <div class="card-meta">${noteListString(rootPc, chord.intervals)}</div>
      ${opts.reorder || ''}
    </div>
  `;
}

function scaleCard(rootPc, scale, scaleIdx, opts = {}) {
  const pcs = pitchClassesFor(rootPc, scale.intervals);
  const piano = renderPiano({ pitchClasses: pcs, rootPc, octaves: 2 });
  const title = scaleTitle(rootPc, scale);
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-titles">
          <h3 class="card-title">${escapeHtml(title)}</h3>
          <span class="card-sub">${scale.intervals.length} tones</span>
        </div>
        ${starButton('scale', scaleIdx, rootPc)}
      </div>
      ${piano}
      <div class="card-meta">${noteListString(rootPc, scale.intervals)}</div>
      ${opts.reorder || ''}
    </div>
  `;
}

function reorderRow(posIdx, totalCount) {
  return `
    <div class="reorder-row">
      <button data-fav-action="up"   data-pos="${posIdx}" ${posIdx === 0 ? 'disabled' : ''} aria-label="Move up">↑</button>
      <button data-fav-action="down" data-pos="${posIdx}" ${posIdx === totalCount - 1 ? 'disabled' : ''} aria-label="Move down">↓</button>
      <span class="pos-pill">${posIdx + 1} / ${totalCount}</span>
    </div>
  `;
}

/* ===== Tabs ===== */
function renderTabs() {
  const wrap = document.getElementById('tabs');
  const rootTabs = ROOTS.map(r => `<button class="tab" data-tab="${r.short}">${r.short}</button>`).join('');
  const customTab = `<button class="tab" data-tab="__custom__">★ List</button>`;
  wrap.innerHTML = rootTabs + customTab;
  wrap.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeTab = btn.dataset.tab;
      savePrefs();
      renderActiveTab();
    });
  });
  syncTabActive();
}

function syncTabActive() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });
  const activeBtn = document.querySelector('.tab.active');
  if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}

/* ===== Page selector (legend) ===== */
function renderPageSelect() {
  const sel = document.getElementById('activePageSelect');
  let html = state.pages.map(p =>
    `<option value="${p.id}" ${p.id === state.activePageId ? 'selected' : ''}>${escapeHtml(p.name)}</option>`
  ).join('');
  html += '<option disabled>──────────</option>';
  html += '<option value="__new">+ New list…</option>';
  html += '<option value="__rename">Rename current…</option>';
  if (state.pages.length > 1) html += '<option value="__delete">Delete current…</option>';
  sel.innerHTML = html;
}

function bindPageSelect() {
  const sel = document.getElementById('activePageSelect');
  sel.addEventListener('change', e => {
    const v = e.target.value;
    if (v === '__new') {
      const name = (prompt('New list name:', '') || '').trim();
      if (name) {
        const id = 'p_' + Date.now().toString(36);
        state.pages.push({ id, name, items: [] });
        state.activePageId = id;
      }
    } else if (v === '__rename') {
      const p = activePage();
      const name = (prompt('Rename list:', p.name) || '').trim();
      if (name) p.name = name;
    } else if (v === '__delete') {
      const p = activePage();
      if (confirm(`Delete list "${p.name}"? Its starred chords will be removed.`)) {
        state.pages = state.pages.filter(pg => pg.id !== state.activePageId);
        state.activePageId = state.pages[0].id;
      }
    } else if (v) {
      state.activePageId = v;
    }
    savePages();
    renderPageSelect();
    renderActiveTab();
  });
}

/* ===== Content ===== */
function renderActiveTab() {
  syncTabActive();
  const content = document.getElementById('content');

  if (state.activeTab === '__custom__') {
    content.innerHTML = renderCustomTab();
    return;
  }

  const root = ROOTS.find(r => r.short === state.activeTab);
  if (!root) { content.innerHTML = ''; return; }

  let chordHtml = '';
  for (const cat of CHORD_CATEGORIES) {
    const items = CHORDS
      .map((c, i) => ({ c, i }))
      .filter(x => x.c.cat === cat);
    if (!items.length) continue;
    chordHtml += `<div class="section-title">${cat}</div>`;
    chordHtml += `<div class="grid">${items.map(x => chordCard(root.pc, x.c, x.i)).join('')}</div>`;
  }
  const scaleCards = SCALES.map((s, i) => scaleCard(root.pc, s, i)).join('');

  content.innerHTML = `
    <div class="toolbar">
      <div>
        <h2 style="margin:0;font-size:1.2rem;">${escapeHtml(root.name)}</h2>
        <div style="font-size:0.78rem;color:var(--text-dim);margin-top:2px;">Chords & scales rooted on ${NOTE_NAMES_SHARP[root.pc]}</div>
      </div>
    </div>
    ${chordHtml}
    <div class="section-title">Scales</div>
    <div class="grid">${scaleCards}</div>
  `;
}

function renderCustomTab() {
  const page = activePage();

  let cardsHtml = '';
  if (!page.items.length) {
    cardsHtml = `<div class="empty-state">
      <strong>No chords starred yet</strong>
      Open any root tab (C, D, E, …) and tap the ☆ on a chord or scale to add it here. Use the <strong>★ list</strong> selector at the top to organise chords by song or practice set.
    </div>`;
  } else {
    cardsHtml = '<div class="grid">' + page.items.map((item, posIdx) => {
      const reorder = reorderRow(posIdx, page.items.length);
      if (item.kind === 'chord') {
        const chord = CHORDS[item.idx];
        if (!chord) return '';
        return chordCard(item.rootPc, chord, item.idx, { reorder });
      } else {
        const scale = SCALES[item.idx];
        if (!scale) return '';
        return scaleCard(item.rootPc, scale, item.idx, { reorder });
      }
    }).join('') + '</div>';
  }

  return `
    <div class="toolbar">
      <div>
        <h2 style="margin:0;font-size:1.2rem;">${escapeHtml(page.name)}</h2>
        <div style="font-size:0.78rem;color:var(--text-dim);margin-top:2px;">${page.items.length} starred · use the ↑ ↓ buttons to reorder</div>
      </div>
    </div>
    ${cardsHtml}
  `;
}

/* ===== Click delegation ===== */
function bindContentClicks() {
  document.getElementById('content').addEventListener('click', e => {
    const star = e.target.closest('[data-star-kind]');
    if (star) {
      const kind = star.dataset.starKind;
      const idx = parseInt(star.dataset.starIdx, 10);
      const rootPc = parseInt(star.dataset.starRoot, 10);
      toggleFavorite(kind, idx, rootPc);
      return;
    }
    const reorder = e.target.closest('[data-fav-action]');
    if (reorder) {
      const action = reorder.dataset.favAction;
      const pos = parseInt(reorder.dataset.pos, 10);
      const items = activePage().items;
      if (action === 'up' && pos > 0) {
        [items[pos-1], items[pos]] = [items[pos], items[pos-1]];
      } else if (action === 'down' && pos < items.length - 1) {
        [items[pos], items[pos+1]] = [items[pos+1], items[pos]];
      }
      savePages();
      renderActiveTab();
    }
  });
}

/* ===== Header buttons ===== */
function bindHeaderEvents() {
  document.getElementById('modeToggle').addEventListener('click', () => {
    const compact = document.body.classList.toggle('mode-compact');
    document.body.classList.toggle('mode-expanded', !compact);
    document.getElementById('modeToggle').textContent = compact ? 'Expanded' : 'Compact';
    savePrefs();
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('themeToggle').textContent = isLight ? '☾' : '☀';
    savePrefs();
  });

  document.getElementById('rootToggle').addEventListener('click', () => {
    const hidden = document.body.classList.toggle('hide-root');
    document.getElementById('rootToggle').textContent = hidden ? 'Show root' : 'Hide root';
    savePrefs();
    /* Re-render so root keys actually clear (they're baked into SVG fills). */
    renderActiveTab();
  });
}

/* ===== Init ===== */
function init() {
  loadState();
  renderTabs();
  bindHeaderEvents();
  renderPageSelect();
  bindPageSelect();
  bindContentClicks();
  renderActiveTab();
}

init();
</script>
</body>
